<BODY>
	<H1>Тег IMG</H1>
	<P>Тег IMG служит для вставки на Web-страницу графического
		изображения.</P>
	<H6>Пример:</H6>
	<PRE>&lt;P&gt;&lt;IMG SRC=&quot;images.png&quot;&gt;&lt;/P&gt;</PRE>
	<H6>Результат:</H6>
	<p><IMG SRC="images.png" alt="Пример изображения"></p>
	<p><a href="../index.html">На главную Web-страницу</a></p>
</BODY>
