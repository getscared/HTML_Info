	<P>Тег AUDIO служит для вставки на Web-страницу аудиоролика.</P>
	<H6>Пример:</H6>
	<PRE>&lt;AUDIO SRC=&quot;sound.mp3&quot;CONTROLS&gt;&lt;/AUDIO&gt;</PRE>
	<H6>Результат:</H6>
	<AUDIO SRC="sound.mp3" CONTROLS></AUDIO>
